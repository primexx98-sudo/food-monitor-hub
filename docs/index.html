<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고메베이글 식품 모니터링 허브</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #0f1216; color: #e9ecef; font-family: 'Malgun Gothic', sans-serif; min-height: 100vh; }
  #hub-nav a[data-hub-key="home"] { color: #fff; font-weight: 700; border-bottom: 2px solid #52b788; }
  .hero { padding: 48px 24px 32px; text-align: center; }
  .hero h1 { margin: 0 0 8px; font-size: 1.9rem; }
  .hero p { margin: 0; color: #adb5bd; font-size: 0.95rem; }
  .cards { max-width: 900px; margin: 0 auto; padding: 0 24px 48px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 700px) { .cards { grid-template-columns: 1fr; } }
  .card { background: #171b21; border: 1px solid #262b33; border-radius: 16px; padding: 28px; text-decoration: none; color: inherit; display: block; transition: transform .15s, border-color .15s; }
  .card:hover { transform: translateY(-3px); border-color: #52b788; }
  .card .icon { font-size: 2rem; margin-bottom: 10px; }
  .card h2 { margin: 0 0 8px; font-size: 1.2rem; }
  .card p { margin: 0; color: #909aa4; font-size: 0.88rem; line-height: 1.5; }
  .card .go { display: inline-block; margin-top: 16px; font-size: 0.82rem; color: #52b788; }
  footer { text-align: center; color: #565d66; font-size: 0.78rem; padding: 24px; }
</style>
</head>
<body>
<div id="hub-nav" style="position:sticky;top:0;z-index:9999;display:flex;gap:0;background:#1b1f24;font-family:'Malgun Gothic',sans-serif;font-size:0.85rem;box-shadow:0 2px 6px rgba(0,0,0,0.25);">
  <a href="/food-monitor-hub/" data-hub-key="home" style="padding:10px 18px;color:#adb5bd;text-decoration:none;">🏠 홈</a>
  <a href="/food-monitor-hub/trend/" data-hub-key="trend" style="padding:10px 18px;color:#adb5bd;text-decoration:none;">🌿 건기식 트렌드</a>
  <a href="/food-monitor-hub/law/" data-hub-key="law" style="padding:10px 18px;color:#adb5bd;text-decoration:none;">⚖️ 법령 모니터</a>
</div>
<div class="hero">
  <h1>고메베이글 식품 모니터링 허브</h1>
  <p>건강기능식품 트렌드와 식품 법령 개정 소식을 한 곳에서 확인하세요.</p>
</div>
<div class="cards">
  <a class="card" href="/food-monitor-hub/trend/">
    <div class="icon">🌿</div>
    <h2>건강기능식품 트렌드 대시보드</h2>
    <p>네이버/구글 트렌드, 급상승 키워드, 국내외 뉴스와 이커머스 판매 동향을 매일 자동 수집합니다.</p>
    <span class="go">대시보드 바로가기 →</span>
  </a>
  <a class="card" href="/food-monitor-hub/law/">
    <div class="icon">⚖️</div>
    <h2>식품 법령 개정 모니터</h2>
    <p>식약처·법제처·식품안전나라의 식품 법령 개정 공고를 매주 자동 수집해 아카이브합니다.</p>
    <span class="go">모니터 바로가기 →</span>
  </a>
</div>
<footer>매일 09:20 (KST) 자동 동기화 · food-monitor-hub</footer>
</body>
</html>
