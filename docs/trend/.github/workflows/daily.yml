name: 건강기능식품 트랜드 수집

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install requests pytrends beautifulsoup4 lxml

      - name: 트랜드 수집 및 대시보드 생성
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          cd 트랜드
          python src/main.py

      - name: 대시보드를 루트 docs로 복사
        run: |
          mkdir -p docs
          cp -r 트랜드/docs/. docs/

      - name: 대시보드 GitHub에 저장
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add docs/
          git diff --staged --quiet || git commit -m "대시보드 업데이트 $(date +'%Y-%m-%d')"
          git push
